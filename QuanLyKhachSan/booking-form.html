<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Thuê Phòng - Khách sạn Paradise</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/booking-form.css">
</head>
<body data-page="bookings">
    <div class="container">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="form-wrapper">
                <!-- Back Button -->
                <a href="booking-list.html" class="btn-back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Quay lại danh sách
                </a>

                <!-- Form Header -->
                <div class="form-header">
                    <div>
                        <h1 id="form-title">Tạo Phiếu Thuê Phòng Mới (BM2)</h1>
                        <p id="form-subtitle" class="subtitle"></p>
                    </div>
                    <div class="header-actions">
                        <button type="button" class="btn-secondary" onclick="printForm()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                                <rect x="6" y="14" width="12" height="8"></rect>
                            </svg>
                            In phiếu
                        </button>
                        <button type="button" class="btn-secondary" onclick="cancelForm()">Hủy</button>
                        <button type="button" class="btn-primary" onclick="saveForm()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                <polyline points="7 3 7 8 15 8"></polyline>
                            </svg>
                            <span id="save-btn-text">Lưu phiếu</span>
                        </button>
                    </div>
                </div>

                <!-- Form Content -->
                <div class="form-content">
                    <form id="booking-form">
                        <!-- Basic Info -->
                        <div class="form-grid">
                            <div class="form-group">
                              <label for="form-date"
                                >Ngày lập <span class="required">*</span></label>
                                <input type="text" id="form-date" readonly />
                            </div>
                            <div class="form-group">
                                <label for="room-number">Số phòng <span class="required">*</span></label>
                                <input type="text" id="room-number" placeholder="Nhập số phòng" required>
                            </div>
                            <div class="form-group">
                                <label for="start-date">Ngày bắt đầu thuê <span class="required">*</span></label>
                                <input type="text" id="start-date" placeholder="ddmmyyyy" maxlength="10" required/>
                            </div>
                        </div>

                        <!-- Guest List -->
                        <div class="guest-section">
                            <div class="guest-header">
                                <h2>Danh sách khách hàng</h2>
                                <p class="guest-count">Tối đa 3 khách / phòng (<span id="current-count">1</span>/3)</p>
                            </div>

                            <div class="table-container">
                                <table id="guest-table">
                                    <thead>
                                        <tr>
                                            <th style="width: 60px;">STT</th>
                                            <th>Khách Hàng <span class="required">*</span></th>
                                            <th style="width: 160px;">Loại Khách <span class="required">*</span></th>
                                            <th style="width: 180px;">CMND <span class="required">*</span></th>
                                            <th>Địa Chỉ</th>
                                            <th style="width: 80px;">Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody id="guest-list">
                                        <!-- Guests will be loaded here -->
                                    </tbody>
                                </table>
                            </div>

                            <button type="button" class="btn-add-guest" id="add-guest-btn" onclick="addGuest()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Thêm khách hàng
                            </button>
                        </div>

                        <!-- Rules Note -->
                        <div class="rules-note">
                            <strong>QĐ2:</strong> Có 2 loại khách (nội địa, nước ngoài). Mỗi phòng có tối đa 3 khách.
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/booking-form.js"></script>
</body>
</html>
