<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Thuê phòng - Khách sạn Paradise</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/booking-list.css">
</head>
<body data-page="bookings">
    <div class="container">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-wrapper">
                <div class="header">
                    <div class="header-left">
                        <h1>Quản lý Thuê Phòng</h1>
                        <p class="subtitle">Tổng số phiếu thuê: <span id="total-bookings">0</span></p>
                    </div>
                    <button class="btn-primary" onclick="createNewBooking()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Tạo phiếu thuê phòng
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="search-bar">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search-input" placeholder="Tìm kiếm theo số phòng hoặc tên khách...">
                </div>

                <!-- Bookings Table -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>STT</th>
                                <th>Số phòng</th>
                                <th>Ngày lập</th>
                                <th>Ngày thuê</th>
                                <th>Số khách</th>
                                <th>Khách hàng</th>
                                <th>Loại khách</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-table">
                            <!-- Data will be loaded here by JS -->
                        </tbody>
                    </table>
                </div>

                <div class="footer-info">
                    Hiển thị <span id="showing-count">0</span> phiếu thuê phòng
                </div>
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/booking-list.js"></script>
</body>
</html>
